name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          umask 077
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Import Developer ID certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import "$RUNNER_TEMP/developer-id.p12" \
            -k build.keychain \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

          security find-identity -v -p codesigning

      - name: Build macOS app
        env:
          CSC_NAME: "XUE YU (MLGMTWMR88)"
          APPLE_API_KEY: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          dmgs=(release/*.dmg)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No DMG files found in release/"
            exit 1
          fi

          gh release create "${{ github.ref_name }}" "${dmgs[@]}" \
            --generate-notes \
            --title "${{ github.ref_name }}"

      - name: Cleanup signing files
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/private_keys"
          rm -f "$RUNNER_TEMP/developer-id.p12"
          security delete-keychain build.keychain || true